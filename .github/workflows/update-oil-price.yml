name: Update Oil Price Data

on:
  schedule:
    # 每天北京时间 00:00 更新 (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Update oil price data
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          cd scripts
          python update_data.py || echo "Update script failed, using fallback"
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet data/oil-prices.json || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/oil-prices.json
          git commit -m "chore: update oil prices $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
