<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国油价地图 - 全国各省实时油价一览</title>
  <meta name="description" content="中国全国各省实时油价地图，鼠标悬浮查看各省 92/95/98 号汽油和 0 号柴油价格，以及近 5 次调价信息">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>">
  
  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/js/china.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }

    .container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 15px 0;
      flex-shrink: 0;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #f39c12, #e74c3c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
    }

    .update-time {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    #map-container {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* 悬浮提示样式 */
    .tooltip {
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      font-size: 13px;
      line-height: 1.6;
      max-width: 280px;
    }

    .tooltip-province {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f39c12;
    }

    .tooltip-prices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tooltip-price-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tooltip-price-label {
      color: #666;
      font-size: 12px;
    }

    .tooltip-price-value {
      font-weight: 600;
      font-size: 14px;
    }

    .price-92 { color: #3498db; }
    .price-95 { color: #e74c3c; }
    .price-98 { color: #9b59b6; }
    .price-0 { color: #27ae60; }

    .tooltip-history {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #ddd;
    }

    .tooltip-history-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .tooltip-history-item {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 3px 0;
      color: #555;
    }

    .price-up {
      color: #e74c3c;
      font-weight: 500;
    }

    .price-down {
      color: #27ae60;
      font-weight: 500;
    }

    .price-unchanged {
      color: #95a5a6;
    }

    /* 图例 */
    .legend {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      font-size: 12px;
      z-index: 100;
    }

    .legend-title {
      font-weight: 600;
      margin-bottom: 10px;
      color: #1a1a2e;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin: 6px 0;
      font-size: 11px;
    }

    .legend-color {
      width: 20px;
      height: 12px;
      margin-right: 8px;
      border-radius: 2px;
    }

    /* 数据来源 */
    .footer {
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: #555;
      flex-shrink: 0;
    }

    .footer a {
      color: #f39c12;
      text-decoration: none;
    }

    /* 加载动画 */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 99;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(243, 156, 18, 0.3);
      border-top-color: #f39c12;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      h1 { font-size: 22px; }
      .subtitle { font-size: 12px; }
      .legend { bottom: 80px; right: 10px; padding: 10px; }
      .container { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⛽ 中国油价地图</h1>
      <p class="subtitle">全国各省实时油价一览 · 鼠标悬浮查看详情</p>
      <p class="update-time" id="update-time">数据更新时间：加载中...</p>
    </header>

    <div id="map-container">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>加载地图数据中...</p>
      </div>
      <div id="map"></div>
    </div>

    <div class="footer">
      数据来源：国家发改委 · 各省发改委价格处
      <span id="data-date"></span>
    </div>
  </div>

  <script src="js/data-loader.js"></script>
  <script src="js/map-config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
